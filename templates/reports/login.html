{% extends 'reports/base.html' %}
{% block title %}日報一覧{% endblock %}

{% block content %}<h1>ログイン</h1>

<form method="post">
    {% csrf_token %}

    <p>
        ユーザー名：<br>
        {{ form.username }}
    </p>

    <p>
        パスワード：<br>
        {{ form.password }}
    </p>

    <button type="submit">ログイン</button>
</form>

<a href="{% url 'password_reset' %}">
    パスワードを忘れた方はこちら
</a>

{% endblock %}
